<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Participant Consent - Research Study</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Progress Indicator -->
                <div class="progress mb-4" style="height: 8px;">
                    <div class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                </div>

                <!-- Consent Card -->
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="card-title text-center mb-4">Participant Consent Form</h1>
                        
                        <!-- Consent content will be loaded here -->
                        <div id="consent-content" class="consent-text mb-4">
                            <p class="text-center text-muted">Loading consent form...</p>
                        </div>

                        <!-- Participant ID Input -->
                        <div class="mb-4">
                            <label for="participant-id" class="form-label fw-bold">Participant Cloud Research ID:</label>
                            <input type="text" class="form-control" id="participant-id" placeholder="Enter your ID" required>
                        </div>

                        <!-- Consent Checkbox -->
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="consent-checkbox">
                            <label class="form-check-label" for="consent-checkbox">
                                I have read and understood the information above and agree to participate in this research study.
                            </label>
                        </div>

                        <!-- Continue Button -->
                        <div class="text-center">
                            <button id="continue-btn" class="btn btn-primary btn-lg" disabled>
                                Continue to Study
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            const idInput = document.getElementById('participant-id');
            const checkbox = document.getElementById('consent-checkbox');
            const continueBtn = document.getElementById('continue-btn');
            
            // Load consent content
            try {
                const consentText = await loadConfig('general/consent.md');
                document.getElementById('consent-content').innerHTML = marked.parse(consentText);
            } catch (error) {
                console.error('Error loading consent:', error);
                document.getElementById('consent-content').innerHTML = '<p class="text-danger">Error loading consent form. Please refresh the page.</p>';
            }
            
            function updateButtonState() {
                continueBtn.disabled = !(checkbox.checked && idInput.value.trim().length > 0);
            }
            
            checkbox.addEventListener('change', updateButtonState);
            idInput.addEventListener('input', updateButtonState);
            
            // Handle continue button
            continueBtn.addEventListener('click', function() {
                const userId = idInput.value.trim();
                if (!userId) {
                    alert('Please enter your Participant Cloud Research ID.');
                    return;
                }
                
                // Assign scenario: use ?s=1..4 query param if provided, otherwise random
                const urlParams = new URLSearchParams(window.location.search);
                const forcedScenario = parseInt(urlParams.get('s'));
                const scenario = (forcedScenario >= 1 && forcedScenario <= 4) ? forcedScenario : Math.floor(Math.random() * 4) + 1;
                
                initSession(userId, scenario);
                updateSession({ consentTime: new Date().toISOString() });
                window.location.href = 'scenario-instruction.html';
            });
        });
    </script>
</body>
</html>
