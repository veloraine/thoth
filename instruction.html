<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Instructions - Research Study</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Progress Indicator -->
                <div class="progress mb-4" style="height: 8px;">
                    <div class="progress-bar" role="progressbar" style="width: 11%;" aria-valuenow="11" aria-valuemin="0" aria-valuemax="100"></div>
                </div>

                <!-- Instructions Card -->
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <!-- User ID Badge -->
                        <div class="text-center mb-3">
                            <span class="badge bg-secondary">Your ID: <span id="user-id-display">---------</span></span>
                        </div>

                        <h1 class="card-title text-center mb-4">Study Instructions</h1>
                        
                        <!-- Instruction content will be loaded here -->
                        <div id="instruction-content" class="instruction-text mb-4">
                            <p class="text-center text-muted">Loading instructions...</p>
                        </div>

                        <!-- Continue Button -->
                        <div class="text-center">
                            <button id="continue-btn" class="btn btn-primary btn-lg">
                                Continue to Mini Test
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            // Check if session exists
            const session = getSession();
            if (!session || !session.userId) {
                alert('No active session found. Please start from the beginning.');
                window.location.href = 'index.html';
                return;
            }
            
            // Display user ID
            document.getElementById('user-id-display').textContent = session.userId;
            
            // Load instruction content
            try {
                const instructionText = await loadConfig('general/main-instruction.md');
                document.getElementById('instruction-content').innerHTML = marked.parse(instructionText);
            } catch (error) {
                console.error('Error loading instructions:', error);
                document.getElementById('instruction-content').innerHTML = '<p class="text-danger">Error loading instructions. Please refresh the page.</p>';
            }
            
            // Handle continue button
            document.getElementById('continue-btn').addEventListener('click', function() {
                window.location.href = 'mini-test.html';
            });
        });
    </script>
</body>
</html>
