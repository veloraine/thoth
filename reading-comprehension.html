<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Reading Comprehension Test - Research Study</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Progress Indicator -->
                <div class="progress mb-4" style="height: 8px;">
                    <div class="progress-bar" role="progressbar" style="width: 70%;" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100"></div>
                </div>

                <!-- Reading Comprehension Card -->
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <!-- Header with Timer -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h1 class="card-title mb-0">Reading Comprehension Test</h1>
                            </div>
                            <span class="badge bg-warning text-dark fs-5" id="timer-display">
                                <span id="comp-timer">--:--</span>
                            </span>
                        </div>
                        
                        <div class="alert alert-info mb-4">
                            Answer the following questions based on the article you just read. You have <strong id="timer-minutes">4</strong> minutes to complete this test.
                        </div>

                        <!-- Questions Form -->
                        <form id="comprehension-form">
                            <div id="questions-container">
                                <p class="text-center text-muted">Loading questions...</p>
                            </div>

                            <!-- Submit Button -->
                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Submit Answers
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    
    <script>
        let loadedQuestions = [];
        let compTimerInterval;
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            // Check session
            const session = getSession();
            if (!session || !session.userId) {
                alert('No active session found. Please start from the beginning.');
                window.location.href = 'index.html';
                return;
            }
            try {
                const settings = await loadConfig('general/settings.json');
                loadedQuestions = await loadConfig('post-test/reading-comprehension.json');
                renderQuestions(loadedQuestions);
                
                const timerSeconds = settings.comprehensionTimer || 240;
                const timerMinutes = Math.floor(timerSeconds / 60);
                document.getElementById('timer-minutes').textContent = timerMinutes;
                
                startCompTimer(timerSeconds);
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('questions-container').innerHTML = '<p class="text-danger">Error loading questions. Please refresh the page.</p>';
            }
            
            // Handle form submission
            document.getElementById('comprehension-form').addEventListener('submit', function(e) {
                e.preventDefault();
                submitForm();
            });
        });
        
        function startCompTimer(seconds) {
            let remaining = seconds;
            updateTimerDisplay(remaining);
            
            compTimerInterval = setInterval(function() {
                remaining--;
                
                if (remaining <= 0) {
                    clearInterval(compTimerInterval);
                    updateTimerDisplay(0);
                    submitForm();
                    return;
                }
                
                updateTimerDisplay(remaining);
                
                if (remaining <= 30) {
                    const badge = document.getElementById('timer-display');
                    if (badge) {
                        badge.classList.remove('bg-warning');
                        badge.classList.add('bg-danger', 'text-white');
                    }
                }
            }, 1000);
        }
        
        function updateTimerDisplay(seconds) {
            const safe = Math.max(0, seconds);
            const m = Math.floor(safe / 60);
            const s = safe % 60;
            const el = document.getElementById('comp-timer');
            if (el) el.textContent = m + ':' + s.toString().padStart(2, '0');
        }
        
        function renderQuestions(questions) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'mb-4 p-3 border rounded';
                
                let html = `
                    <h5 class="mb-3">Question ${index + 1}</h5>
                    <p class="fw-bold">${q.question}</p>
                `;
                
                if (q.type === 'multiple-choice') {
                    q.options.forEach((option, optIndex) => {
                        html += `
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="q${q.id}" id="q${q.id}_${optIndex}" value="${optIndex}" required>
                                <label class="form-check-label" for="q${q.id}_${optIndex}">
                                    ${option}
                                </label>
                            </div>
                        `;
                    });
                }
                
                questionDiv.innerHTML = html;
                container.appendChild(questionDiv);
            });
        }
        
        function submitForm() {
            if (compTimerInterval) clearInterval(compTimerInterval);
            
            const form = document.getElementById('comprehension-form');
            const formData = new FormData(form);
            const answers = {};
            let correctCount = 0;
            
            loadedQuestions.forEach(function(q) {
                const val = formData.get('q' + q.id);
                if (val === null) return;
                const selectedIndex = parseInt(val);
                const isCorrect = selectedIndex === q.correctAnswer;
                if (isCorrect) correctCount++;
                answers[q.id] = {
                    answer: q.options[selectedIndex],
                    isCorrect: isCorrect
                };
            });
            
            updateSession({
                readingComprehensionAnswers: answers,
                readingComprehensionScore: correctCount * 10
            });
            window.location.href = 'manipulation-check.html';
        }
    </script>
</body>
</html>
