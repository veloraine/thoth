<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Self-Report Survey - Research Study</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Progress Indicator -->
                <div class="progress mb-4" style="height: 8px;">
                    <div class="progress-bar" role="progressbar" style="width: 66%;" aria-valuenow="66" aria-valuemin="0" aria-valuemax="100"></div>
                </div>

                <!-- Self-Report Card -->
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="card-title text-center mb-4">Post-Reading Questionnaire (2/4)</h1>
                        <h3 class="text-center text-muted mb-4">Self-Report Survey</h3>
                        
                        <div class="alert alert-info mb-4">
                            Please rate your reading experience based on the following statements.
                        </div>

                        <!-- Questions Form -->
                        <form id="self-report-form">
                            <div id="questions-container">
                                <p class="text-center text-muted">Loading questions...</p>
                            </div>

                            <!-- Submit Button -->
                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Continue
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    
    <script>
        let loadedQuestions = [];
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            // Check session
            const session = getSession();
            if (!session || !session.userId) {
                alert('No active session found. Please start from the beginning.');
                window.location.href = 'index.html';
                return;
            }
            try {
                loadedQuestions = await loadConfig('post-test/self-report.json');
                renderQuestions(loadedQuestions);
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('questions-container').innerHTML = '<p class="text-danger">Error loading questions. Please refresh the page.</p>';
            }
            
            // Handle form submission
            document.getElementById('self-report-form').addEventListener('submit', function(e) {
                e.preventDefault();
                submitForm();
            });
        });
        
        function renderQuestions(questions) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'mb-4 p-3 border rounded';
                
                let html = `
                    <h5 class="mb-3">Question ${index + 1}</h5>
                    <p class="fw-bold">${q.question}</p>
                `;
                
                if (q.type === 'multiple-choice') {
                    q.options.forEach((option, optIndex) => {
                        html += `
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="q${q.id}" id="q${q.id}_${optIndex}" value="${optIndex}" required>
                                <label class="form-check-label" for="q${q.id}_${optIndex}">
                                    ${option}
                                </label>
                            </div>
                        `;
                    });
                } else if (q.type === 'likert') {
                    const scale = q.scale || 5;
                    html += '<div class="likert-scale">';
                    if (q.labels && q.labels.length === 2) {
                        html += `<div class="d-flex justify-content-between mb-2"><small>${q.labels[0]}</small><small>${q.labels[1]}</small></div>`;
                    }
                    html += '<div class="d-flex justify-content-between align-items-center">';
                    for (let i = 1; i <= scale; i++) {
                        html += `
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="q${q.id}" id="q${q.id}_${i}" value="${i}" required>
                                <label class="form-check-label" for="q${q.id}_${i}">${i}</label>
                            </div>
                        `;
                    }
                    html += '</div></div>';
                }
                
                questionDiv.innerHTML = html;
                container.appendChild(questionDiv);
            });
        }
        
        function submitForm() {
            const form = document.getElementById('self-report-form');
            const formData = new FormData(form);
            const answers = {};
            
            loadedQuestions.forEach(function(q) {
                const val = formData.get('q' + q.id);
                if (val === null) return;
                const entry = { question: q.question };
                if (q.type === 'multiple-choice') {
                    entry.answer = q.options[parseInt(val)];
                } else if (q.type === 'likert') {
                    entry.answer = parseInt(val);
                    if (q.labels) entry.scale = q.labels[0] + ' - ' + q.labels[1];
                }
                answers[q.id] = entry;
            });
            
            updateSession({ selfReportAnswers: answers });
            window.location.href = 'reading-comprehension.html';
        }
    </script>
</body>
</html>
